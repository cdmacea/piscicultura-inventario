server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: piscicultura-inventario

  datasource:
    # Base de datos "piscicultura". Sobrescribible con variables de entorno
    # (útil para no dejar credenciales reales en el repositorio).
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:piscicultura}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:changeme-local-dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'none': el esquema lo gestiona Flyway (backend/src/main/resources/db/migration).
      # Usa 'validate' si quieres que Hibernate verifique el mapeo al arrancar.
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    # Los datos viven en estos 3 esquemas (no en "public"): Flyway debe mirar
    # ahí para decidir si están vacíos o no al evaluar el baseline.
    schemas: inventario,produccion,negocio
    # La base "piscicultura" ya tenía el esquema creado a mano (scripts /database)
    # antes de introducir Flyway; se marca como si V1..V4 ya se hubieran aplicado
    # para no reejecutarlos sobre datos existentes. Las bases nuevas sí corren V1..V4.
    baseline-on-migrate: true
    baseline-version: 4

# Documentación interactiva: http://localhost:8081/api/swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html

# Origen permitido para el frontend Angular
app:
  cors:
    allowed-origins: "http://localhost:4200"
  security:
    # Usuario único de acceso a la aplicación (no hay gestión de usuarios/roles).
    # Sobrescribe ADMIN_USERNAME/ADMIN_PASSWORD/JWT_SECRET en producción.
    admin-username: ${ADMIN_USERNAME:admin}
    admin-password: ${ADMIN_PASSWORD:changeme-local-dev}
    jwt-secret: ${JWT_SECRET:cambia-este-secreto-en-produccion-minimo-32-caracteres}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
